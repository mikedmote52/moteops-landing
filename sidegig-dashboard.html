<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Gig Bot — Intelligence Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #08080d;
            color: #c8c8d8;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, #0c0c14 0%, #141428 100%);
            border-bottom: 1px solid #1e1e3a;
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .header-inner {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #7c6cf7 0%, #00e8b0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.9rem;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            font-size: 0.85rem;
            color: #6a6a8a;
        }

        .header-stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
        }

        .header-stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #5a5a7a;
        }

        .header-stat-value {
            color: #7c6cf7;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(0,232,176,0.08);
            border: 1px solid rgba(0,232,176,0.3);
            color: #00e8b0;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .live-dot {
            width: 7px; height: 7px;
            background: #00e8b0;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .date-display { color: #6a6a8a; }

        /* Main */
        main {
            max-width: 1440px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Daily Brief */
        .daily-brief {
            background: linear-gradient(135deg, #12122a 0%, #1a1a3a 100%);
            border: 1px solid #2a2a4e;
            border-radius: 14px;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .daily-brief::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #7c6cf7 0%, #00e8b0 50%, #7c6cf7 100%);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

        .brief-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #7c6cf7;
            margin-bottom: 0.75rem;
        }

        .brief-text {
            font-size: 1.05rem;
            color: #e0e0f0;
            line-height: 1.7;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: #10101e;
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.25rem;
        }

        .stat-number.green { color: #00e8b0; }
        .stat-number.purple { color: #7c6cf7; }
        .stat-number.blue { color: #4ea8de; }
        .stat-number.amber { color: #f0a030; }
        .stat-number.red { color: #e05060; }

        .stat-label {
            font-size: 0.8rem;
            color: #6a6a8a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Thesis Cards */
        .thesis-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .thesis-card {
            background: #10101e;
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            padding: 1.5rem;
        }

        .thesis-card .brief-label { margin-bottom: 0.5rem; }
        .thesis-card .brief-label.weekly { color: #4ea8de; }
        .thesis-card .brief-label.monthly { color: #f0a030; }

        .thesis-text {
            font-size: 0.95rem;
            color: #b0b0c8;
            line-height: 1.6;
        }

        /* Tabs */
        .tab-bar {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #1e1e3a;
            margin-bottom: 2rem;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            color: #6a6a8a;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover { color: #a0a0c0; }

        .tab-btn.active {
            color: #7c6cf7;
            border-bottom-color: #7c6cf7;
        }

        .tab-count {
            display: inline-block;
            background: rgba(124,108,247,0.15);
            color: #7c6cf7;
            font-size: 0.75rem;
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            margin-left: 0.4rem;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* Opportunity Cards */
        .opp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 1.5rem;
        }

        .opp-card {
            background: linear-gradient(135deg, #12122a, #161636);
            border: 1px solid #2a2a4e;
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            transition: all 0.25s ease;
        }

        .opp-card:hover {
            border-color: #7c6cf7;
            box-shadow: 0 6px 24px rgba(124,108,247,0.12);
            transform: translateY(-2px);
        }

        .opp-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .opp-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: #f0f0ff;
            flex: 1;
            padding-right: 1rem;
        }

        .tier-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.25rem 0.6rem;
            border-radius: 5px;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .tier-1 { background: rgba(0,232,176,0.12); color: #00e8b0; }
        .tier-2 { background: rgba(78,168,222,0.12); color: #4ea8de; }
        .tier-3 { background: rgba(106,106,138,0.15); color: #8a8aa0; }

        .opp-status {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }

        .status-ready_to_deploy { background: rgba(0,232,176,0.12); color: #00e8b0; }
        .status-deployed { background: rgba(124,108,247,0.15); color: #b8a7ff; }
        .status-in_simulation { background: rgba(240,160,48,0.12); color: #f0a030; }
        .status-research { background: rgba(78,168,222,0.12); color: #4ea8de; }

        .opp-desc {
            font-size: 0.9rem;
            color: #8a8aa8;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        /* Probability Timeline Sparkline */
        .prob-timeline {
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .prob-timeline-label {
            font-size: 0.7rem;
            color: #5a5a7a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .prob-sparkline {
            width: 100%;
            height: 30px;
        }

        .opp-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .opp-meta-item {
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
        }

        .opp-meta-label {
            font-size: 0.7rem;
            color: #5a5a7a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .opp-meta-value {
            font-size: 0.9rem;
            color: #d0d0e0;
            font-weight: 600;
        }

        /* Simulation Bar */
        .sim-section { margin-bottom: 1rem; }

        .sim-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .sim-label {
            font-size: 0.78rem;
            color: #6a6a8a;
            width: 150px;
            flex-shrink: 0;
        }

        .sim-bar-bg {
            flex: 1;
            height: 6px;
            background: #1a1a30;
            border-radius: 3px;
            overflow: hidden;
        }

        .sim-bar-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.6s ease;
        }

        .sim-bar-fill.high { background: linear-gradient(90deg, #00e8b0, #00c898); }
        .sim-bar-fill.med { background: linear-gradient(90deg, #f0a030, #d08828); }
        .sim-bar-fill.low { background: linear-gradient(90deg, #e05060, #c04050); }

        .sim-pct {
            font-size: 0.8rem;
            font-weight: 700;
            width: 40px;
            text-align: right;
            color: #a0a0c0;
        }

        /* Evidence Toggle */
        .evidence-toggle {
            background: none;
            border: 1px solid #2a2a4e;
            color: #6a6a8a;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .evidence-toggle:hover { border-color: #7c6cf7; color: #a0a0c0; }

        .evidence-list {
            display: none;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
        }

        .evidence-list.open { display: block; }

        .evidence-item {
            font-size: 0.85rem;
            color: #8a8aa8;
            padding: 0.4rem 0;
            padding-left: 1rem;
            position: relative;
            line-height: 1.5;
        }

        .evidence-item::before {
            content: '>';
            position: absolute;
            left: 0;
            color: #00e8b0;
            font-weight: 700;
        }

        /* Deployed link */
        .deployed-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: #7c6cf7;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 0.5rem;
            transition: color 0.2s;
        }

        .deployed-link:hover { color: #00e8b0; }

        /* Signals Feed */
        .signal-feed { display: grid; gap: 0.75rem; }

        .signal-card {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            background: #10101e;
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            padding: 1rem 1.25rem;
            transition: all 0.2s;
        }

        .signal-card:hover {
            border-color: #2a2a5e;
            transform: translateX(3px);
        }

        .signal-impact {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px; height: 36px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .impact-high { background: rgba(0,232,176,0.1); color: #00e8b0; }
        .impact-medium { background: rgba(240,160,48,0.1); color: #f0a030; }
        .impact-low { background: rgba(106,106,138,0.1); color: #8a8aa0; }

        .signal-content { flex: 1; }

        .signal-text-main {
            font-size: 0.95rem;
            color: #d0d0e0;
            margin-bottom: 0.25rem;
        }

        .signal-source {
            font-size: 0.8rem;
            color: #5a5a7a;
        }

        /* Deployed Assets */
        .deployed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
        }

        .deployed-card {
            background: #10101e;
            border: 1px solid #1e1e3a;
            border-radius: 10px;
            padding: 1.25rem;
        }

        .deployed-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: #e0e0f0;
            margin-bottom: 0.5rem;
        }

        .deployed-meta {
            font-size: 0.85rem;
            color: #6a6a8a;
            margin-bottom: 0.5rem;
        }

        .deployed-status-tag {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }

        .dst-live { background: rgba(0,232,176,0.12); color: #00e8b0; }
        .dst-built { background: rgba(124,108,247,0.12); color: #b8a7ff; }
        .dst-active { background: rgba(78,168,222,0.12); color: #4ea8de; }

        /* Rejected */
        .rejected-list { display: grid; gap: 0.5rem; }

        .rejected-item {
            display: flex;
            gap: 1rem;
            align-items: baseline;
            background: #10101e;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            padding: 0.9rem 1.25rem;
        }

        .rejected-name {
            font-weight: 600;
            color: #8a8aa0;
            min-width: 180px;
            text-decoration: line-through;
            text-decoration-color: rgba(224,80,96,0.3);
        }

        .rejected-reason {
            font-size: 0.85rem;
            color: #5a5a7a;
        }

        /* Decisions */
        .decision-list { display: grid; gap: 0.75rem; }

        .decision-card {
            background: linear-gradient(135deg, #1a1220, #201430);
            border: 1px solid #3a2850;
            border-left: 3px solid #7c6cf7;
            border-radius: 10px;
            padding: 1.25rem;
            transition: all 0.2s;
        }

        .decision-card.toggled-do {
            background: linear-gradient(135deg, #1a2a1a, #203a20);
            border-left-color: #00e8b0;
            opacity: 0.75;
        }

        .decision-card.toggled-skip {
            background: linear-gradient(135deg, #2a1a1a, #3a2020);
            border-left-color: #e05060;
            opacity: 0.6;
        }

        .decision-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }

        .decision-urgent { color: #e05060; }
        .decision-normal { color: #f0a030; }

        .decision-text {
            font-size: 0.95rem;
            color: #d0d0e0;
            line-height: 1.5;
            margin-bottom: 0.75rem;
        }

        .decision-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .decision-btn {
            padding: 0.4rem 0.9rem;
            border: 1px solid;
            background: none;
            border-radius: 5px;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .decision-btn-do {
            color: #00e8b0;
            border-color: #00e8b0;
        }

        .decision-btn-do:hover {
            background: rgba(0,232,176,0.1);
        }

        .decision-btn-skip {
            color: #e05060;
            border-color: #e05060;
        }

        .decision-btn-skip:hover {
            background: rgba(224,80,96,0.1);
        }

        /* Predictions Panel */
        .predictions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .prediction-card {
            background: linear-gradient(135deg, #12122a, #161636);
            border: 1px solid #2a2a4e;
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.25s ease;
        }

        .prediction-card:hover {
            border-color: #7c6cf7;
            box-shadow: 0 6px 24px rgba(124,108,247,0.12);
            transform: translateY(-2px);
        }

        .prediction-claim {
            font-size: 1rem;
            font-weight: 600;
            color: #f0f0ff;
            margin-bottom: 1rem;
            line-height: 1.5;
        }

        .prediction-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .prediction-meta-item {
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
        }

        .prediction-meta-label {
            font-size: 0.7rem;
            color: #5a5a7a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .prediction-meta-value {
            font-size: 0.9rem;
            color: #d0d0e0;
            font-weight: 600;
        }

        .prediction-countdown {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.75rem;
            border-radius: 8px;
            text-align: center;
            margin-top: 1rem;
        }

        .countdown-urgent {
            background: rgba(224,80,96,0.15);
            color: #e05060;
            border: 1px solid rgba(224,80,96,0.3);
        }

        .countdown-medium {
            background: rgba(240,160,48,0.15);
            color: #f0a030;
            border: 1px solid rgba(240,160,48,0.3);
        }

        .countdown-relaxed {
            background: rgba(0,232,176,0.15);
            color: #00e8b0;
            border: 1px solid rgba(0,232,176,0.3);
        }

        /* Calibration Section */
        .calibration-panel {
            background: linear-gradient(135deg, #12122a 0%, #1a1a3a 100%);
            border: 1px solid #2a2a4e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .calibration-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .calibration-title {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #7c6cf7;
        }

        .calibration-toggle {
            font-size: 1.2rem;
            color: #7c6cf7;
            transition: transform 0.2s;
        }

        .calibration-toggle.open {
            transform: rotate(180deg);
        }

        .calibration-content {
            display: none;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #2a2a4e;
        }

        .calibration-content.open {
            display: grid;
        }

        .calibration-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .calibration-item {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 1rem;
        }

        .calibration-label {
            font-size: 0.7rem;
            color: #5a5a7a;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
        }

        .calibration-value {
            font-size: 1.1rem;
            font-weight: 700;
            color: #d0d0e0;
            margin-bottom: 0.25rem;
        }

        .calibration-meta {
            font-size: 0.75rem;
            color: #6a6a8a;
        }

        .base-rates-list {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .base-rate-item {
            display: grid;
            grid-template-columns: 1fr 80px;
            gap: 1rem;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .base-rate-item:last-child {
            border-bottom: none;
        }

        .base-rate-name {
            font-size: 0.85rem;
            color: #c8c8d8;
        }

        .base-rate-value {
            font-weight: 700;
            color: #7c6cf7;
            text-align: right;
        }

        .learning-entry {
            background: rgba(0,0,0,0.2);
            border-left: 3px solid #4ea8de;
            border-radius: 6px;
            padding: 0.75rem;
            margin-top: 0.5rem;
            font-size: 0.85rem;
        }

        .learning-date {
            color: #5a5a7a;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }

        .learning-type {
            color: #4ea8de;
            font-weight: 600;
            margin: 0.3rem 0;
        }

        .learning-insight {
            color: #8a8aa8;
            line-height: 1.5;

            if (data.lastUpdated) {
                const d = new Date(data.lastUpdated);
                $('footer-updated').textContent = 'Last scan: ' + d.toLocaleString();
            }

            // Stats
            const s = data.summary || {};
            $('stats-row').innerHTML = [
                { n: s.totalOpportunitiesScanned||0, l:'Scanned', c:'purple' },
                { n: s.vetted||0, l:'Vetted', c:'blue' },
                { n: s.readyToDeploy||0, l:'Ready', c:'green' },
                { n: s.inSimulation||0, l:'Simulating', c:'amber' },
                { n: s.rejected||0, l:'Rejected', c:'red' }
            ].map(x => `
                <div class="stat-card">
                    <div class="stat-number ${x.c}">${x.n}</div>
                    <div class="stat-label">${x.l}</div>
                </div>
            `).join('');

            // Evolution Tracker
            const totalCycles = data.researchCycle || 1;
            const cyclesHtml = Array.from({length: Math.max(totalCycles, 5)}, (_, i) => {
                let cls = 'cycle-dot';
                if (i < totalCycles - 1) cls += ' completed';
                else if (i === totalCycles - 1) cls += ' current';
                return '<div class="' + cls + '"></div>';
            }).join('');
            $('evolution-bar').innerHTML = '<div class="evolution-label">Research Cycle</div><div class="evolution-cycles">' + cyclesHtml + '</div><div class="evolution-text">Cycle ' + totalCycles + ' — ' + (data.summary.totalOpportunitiesScanned||0) + ' opportunities scanned, ' + (data.calibration?.learnings?.entries?.length||0) + ' learnings logged</div>';

            // Calibration Panel
            renderCalibration(data.calibration);

            // Tabs
            const opps = data.opportunities || [];
            const sigs = data.signals || [];
            const deployed = data.deployedAssets || [];
            const rejected = data.rejectedOpportunities || [];
            const predictions = collectPredictions(opps);

            const tabs = [
                { id:'opportunities', label:'Opportunities', count: opps.length },
                { id:'signals', label:'Signals', count: sigs.length },
                { id:'deployed', label:'Deployed', count: deployed.length },
                { id:'rejected', label:'Rejected', count: rejected.length },
                { id:'decisions', label:'Decisions', count: '' },
                { id:'predictions', label:'Predictions', count: predictions.length }
            ];

            $('tab-bar').innerHTML = tabs.map((t,i) => `
                <button class="tab-btn${i===0?' active':''}" data-tab="${t.id}">
                    ${t.label}${t.count!==''?`<span class="tab-count">${t.count}</span>`:''}
                </button>
            `).join('');

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                    btn.classList.add('active');
                    $('panel-'+btn.dataset.tab).classList.add('active');
                });
            });

            // Opportunities
            $('panel-opportunities').innerHTML = '<div class="opp-grid">' + opps.map(renderOpp).join('') + '</div>';

            // Signals
            $('panel-signals').innerHTML = '<div class="signal-feed">' + sigs.map(renderSignal).join('') + '</div>';

            // Deployed
            $('panel-deployed').innerHTML = '<div class="deployed-grid">' + deployed.map(renderDeployed).join('') + '</div>';

            // Rejected
            $('panel-rejected').innerHTML = '<div class="rejected-list">' + rejected.map(renderRejected).join('') + '</div>';

            // Decisions
            renderDecisions(opps);

            // Predictions
            renderPredictions(predictions);
        }

        function renderCalibration(cal) {
            if (!cal) return;

            const toggle = () => {
                const content = panel.querySelector('.calibration-content');
                const icon = panel.querySelector('.calibration-toggle');
                content.classList.toggle('open');
                icon.classList.toggle('open');
            };

            const baseRatesHtml = Object.entries(cal.baseRates || {}).map(([k, v]) => `
                <div class="base-rate-item">
                    <div class="base-rate-name">${escHtml(v.label || k)}</div>
                    <div class="base-rate-value">${Math.round(v.value * 100)}%</div>
                </div>
            `).join('');

            const learningsHtml = (cal.learnings?.entries || []).map(entry => `
                <div class="learning-entry">
                    <div class="learning-date">${entry.date}</div>
                    <div class="learning-type">${(entry.type || '').replace(/_/g, ' ')}</div>
                    <div class="learning-insight">${escHtml(entry.insight)}</div>
                </div>
            `).join('');

            const html = `
                <div class="calibration-header" onclick="this.parentElement.querySelector('.calibration-content').classList.toggle('open'); this.parentElement.querySelector('.calibration-toggle').classList.toggle('open');">
                    <div class="calibration-title">📊 Calibration & Base Rates</div>
                    <div class="calibration-toggle">▼</div>
                </div>
                <div class="calibration-content">
                    <div class="calibration-grid">
                        <div class="calibration-item">
                            <div class="calibration-label">Total Predictions</div>
                            <div class="calibration-value">${cal.totalPredictions || 0}</div>
                            <div class="calibration-meta">Active forecasts</div>
                        </div>
                        <div class="calibration-item">
                            <div class="calibration-label">Resolved</div>
                            <div class="calibration-value">${cal.resolvedPredictions || 0}</div>
                            <div class="calibration-meta">Outcomes tracked</div>
                        </div>
                        <div class="calibration-item">
                            <div class="calibration-label">Brier Score</div>
                            <div class="calibration-value">${cal.brierScore !== null ? cal.brierScore.toFixed(3) : 'Pending'}</div>
                            <div class="calibration-meta">Lower is better (0 = perfect)</div>
                        </div>
                        <div class="calibration-item">
                            <div class="calibration-label">Status</div>
                            <div class="calibration-value">${escHtml(cal.calibrationStatus || 'Tracking')}</div>
                            <div class="calibration-meta">Forecast quality</div>
                        </div>
                    </div>
                    ${baseRatesHtml ? `<div class="base-rates-list"><strong style="color:#7c6cf7;font-size:0.85rem;">Base Rates (Prior Probabilities)</strong>${baseRatesHtml}</div>` : ''}
                    ${learningsHtml ? `<div style="margin-top:1rem;"><strong style="color:#7c6cf7;font-size:0.85rem;">Learning Entries</strong>${learningsHtml}</div>` : ''}
                </div>
            `;

            $('calibration-panel').innerHTML = html;
        }

        function collectPredictions(opps) {
            const preds = [];
            opps.forEach(opp => {
                if (opp.predictions && Array.isArray(opp.predictions)) {
                    opp.predictions.forEach(pred => {
                        preds.push({
                            ...pred,
                            opportunityName: opp.name,
                            opportunityId: opp.id
                        });
                    });
                }
            });
            return preds;
        }

        function renderPredictions(predictions) {
            if (!predictions || predictions.length === 0) {
                $('panel-predictions').innerHTML = '<div style="padding:2rem;text-align:center;color:#6a6a8a;">No active predictions yet. Create opportunities with prediction data.</div>';
                return;
            }

            const html = predictions.map(pred => {
                const resDate = new Date(pred.resolutionDate);
                const today = new Date();
                const daysRemaining = Math.ceil((resDate - today) / (1000 * 60 * 60 * 24));
                let urgency = 'relaxed';
                let countdownClass = 'countdown-relaxed';
                if (daysRemaining <= 30) {
                    urgency = 'URGENT';
                    countdownClass = 'countdown-urgent';
                } else if (daysRemaining <= 60) {
                    urgency = 'MEDIUM';
                    countdownClass = 'countdown-medium';
                }

                return `
                    <div class="prediction-card">
                        <div class="prediction-claim">${escHtml(pred.claim)}</div>
                        <div class="prediction-meta">
                            <div class="prediction-meta-item">
                                <div class="prediction-meta-label">Probability</div>
                                <div class="prediction-meta-value">${Math.round(pred.probability * 100)}%</div>
                            </div>
                            <div class="prediction-meta-item">
                                <div class="prediction-meta-label">From Opportunity</div>
                                <div class="prediction-meta-value">${escHtml(pred.opportunityName)}</div>
                            </div>
                        </div>
                        <div class="prediction-countdown ${countdownClass}">
                            ⏱️ ${daysRemaining} days remaining (${resDate.toLocaleDateString('en-US', {month:'short', day:'numeric'})})
                        </div>
                    </div>
                `;
            }).join('');

            $('panel-predictions').innerHTML = '<div class="predictions-grid">' + html + '</div>';
        }

        function renderOpp(opp) {
            const sim = opp.simulation || {};
            const simRows = Object.entries(sim)
                .filter(([k]) => k.startsWith('probability'))
                .map(([k, v]) => {
                    const label = k.replace('probability','')
                        .replace(/([A-Z])/g, ' $1')
                        .replace(/(\d+)/g, ' $1')
                        .replace(/^\s+/,'')
                        .replace(/\s+/g, ' ');
                    const pct = Math.round(v * 100);
                    const cls = pct >= 35 ? 'high' : pct >= 20 ? 'med' : 'low';
                    return `<div class="sim-row">
                        <span class="sim-label">${label}</span>
                        <div class="sim-bar-bg"><div class="sim-bar-fill ${cls}" style="width:${pct}%"></div></div>
                        <span class="sim-pct">${pct}%</span>
                    </div>`;
                }).join('');

            // Probability Timeline Sparkline
            const probHistory = opp.probabilityHistory || [];
            let sparklineHtml = '';
            if (probHistory.length > 0) {
                const svgHtml = renderProbabilitySparkline(probHistory);
                sparklineHtml = `
                    <div class="prob-timeline">
                        <div class="prob-timeline-label">Probability History</div>
                        ${svgHtml}
                    </div>
                `;
            }

            const evidenceId = 'ev-' + opp.id;
            const evidenceHtml = (opp.evidence||[]).map(e =>
                `<div class="evidence-item">${escHtml(e)}</div>`
            ).join('');

            const nextHtml = (opp.nextSteps||[]).map(s =>
                `<div class="next-step-item">${escHtml(s)}</div>`
            ).join('');

            const deployedLink = opp.deployedUrl
                ? `<a class="deployed-link" href="${escHtml(opp.deployedUrl)}" target="_blank">View Live ↗</a>`
                : '';

            return `<div class="opp-card">
                <div class="opp-header">
                    <span class="opp-name">${escHtml(opp.name)}</span>
                    <span class="tier-badge tier-${opp.tier||3}">Tier ${opp.tier||'?'}</span>
                </div>
                <span class="opp-status status-${opp.status||''}">${(opp.status||'').replace(/_/g,' ')}</span>
                ${deployedLink}
                <div class="opp-desc">${escHtml(opp.description||'')}</div>
                ${sparklineHtml}
                <div class="opp-meta-grid">
                    <div class="opp-meta-item">
                        <div class="opp-meta-label">Revenue Model</div>
                        <div class="opp-meta-value">${escHtml(opp.revenueModel||'TBD')}</div>
                    </div>
                    <div class="opp-meta-item">
                        <div class="opp-meta-label">Build Time</div>
                        <div class="opp-meta-value">${escHtml(sim.estimatedBuildTime||'TBD')}</div>
                    </div>
                    <div class="opp-meta-item">
                        <div class="opp-meta-label">Launch Cost</div>
                        <div class="opp-meta-value">${escHtml(sim.estimatedCostToLaunch||'$0')}</div>
                    </div>
                    <div class="opp-meta-item">
                        <div class="opp-meta-label">Moat</div>
                        <div class="opp-meta-value">${escHtml(sim.moatStrength||'TBD')}</div>
                    </div>
                </div>
                ${simRows ? '<div class="sim-section">'+simRows+'</div>' : ''}
                ${evidenceHtml ? `<button class="evidence-toggle" onclick="toggleEvidence('${evidenceId}',this)">Show Evidence (${opp.evidence.length})</button>
                <div class="evidence-list" id="${evidenceId}">${evidenceHtml}</div>` : ''}
                ${nextHtml ? '<div class="next-steps">'+nextHtml+'</div>' : ''}
            </div>`;
        }

        function renderProbabilitySparkline(history) {
            if (history.length < 2) {
                return '<svg class="prob-sparkline" viewBox="0 0 200 30"><text x="100" y="15" text-anchor="middle" fill="#5a5a7a" font-size="10">Need more data</text></svg>';
            }

            const values = history.map(h => h.value);
            const minVal = Math.min(...values);
            const maxVal = Math.max(...values);
            const range = maxVal - minVal || 1;
            const w = 200;
            const h = 30;
            const padding = 5;
            const graphW = w - 2 * padding;
            const graphH = h - 2 * padding;
            const step = graphW / (values.length - 1);

            const points = values.map((v, i) => {
                const x = padding + i * step;
                const y = padding + graphH - ((v - minVal) / range) * graphH;
                return `${x},${y}`;
            }).join(' ');

            const colorVal = Math.round(values[values.length - 1] * 100);
            let color = '#e05060';
            if (colorVal >= 35) color = '#00e8b0';
            else if (colorVal >= 20) color = '#f0a030';

            return `<svg class="prob-sparkline" viewBox="0 0 200 30">
                <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="${padding + (values.length - 1) * step}" cy="${padding + graphH - ((values[values.length - 1] - minVal) / range) * graphH}" r="3" fill="${color}"/>
            </svg>`;
        }

        function renderSignal(sig) {
            const impact = sig.impact || 'medium';
            return `<div class="signal-card">
                <div class="signal-impact impact-${impact}">${impact.slice(0,1).toUpperCase()}</div>
                <div class="signal-content">
                    <div class="signal-text-main">${escHtml(sig.signal)}</div>
                    <div class="signal-source">${escHtml(sig.source||'')} &middot; ${sig.date||''}</div>
                </div>
            </div>`;
        }

        function renderDeployed(asset) {
            const statusMap = { live:'dst-live', built_not_listed:'dst-built', built_not_deployed:'dst-built', active:'dst-active' };
            const cls = statusMap[asset.status] || 'dst-built';
            const link = asset.url ? `<a class="deployed-link" href="${escHtml(asset.url)}" target="_blank">View ↗</a>` : '';
            const price = asset.suggestedPrice ? ` &middot; ${escHtml(asset.suggestedPrice)}` : '';
            return `<div class="deployed-card">
                <div class="deployed-name">${escHtml(asset.name)}</div>
                <div class="deployed-meta">${escHtml(asset.type||'')}${price}</div>
                <span class="deployed-status-tag ${cls}">${(asset.status||'').replace(/_/g,' ')}</span>
                ${link}
            </div>`;
        }

        function renderRejected(r) {
            return `<div class="rejected-item">
                <span class="rejected-name">${escHtml(r.name)}</span>
                <span class="rejected-reason">${escHtml(r.reason)}</span>
            </div>`;
        }

        function renderDecisions(opps) {
            const decisions = [
                { urgent:true, text:'EXECUTE: Post the 3 Reddit threads (r/smallbusiness, r/Entrepreneur, r/automation). Copy-paste ready in outreach/READY-TO-POST.md. Three sessions of planning with zero market contact.' },
                { urgent:true, text:'EXECUTE: Submit top 2 Upwork proposals ($1,200 AI automation jobs). Templates in outreach/upwork-proposals.md.' },
                { urgent:true, text:'EXECUTE: Contact mom\'s daycare to schedule AI audit. This is your first case study — it costs nothing and proves the model.' },
                { urgent:true, text:'Fix n8n API connection — URL returning 404. Check API key permissions at https://mikedmote.app.n8n.cloud. Needed for all automation workflows.' },
                { urgent:false, text:'Package the 90-Day AI Transformation consulting offer with tiered pricing ($500 audit / $2.5K-7.5K implementation / $1-2.5K retainer).' },
                { urgent:false, text:'Set up professional email (moteops@gmail.com) and deploy proposal webhook to Render.' },
                { urgent:false, text:'Write 3 LinkedIn posts about AI implementation ROI using the McKinsey 67% revenue growth stat.' },
                { urgent:false, text:'Product Hunt launch for InstantProposal — target 100+ signups.' }
            ];

            $('panel-decisions').innerHTML = '<div class="decision-list">' + decisions.map((d, idx) => `
                <div class="decision-card" data-decision-idx="${idx}">
                    <div class="decision-label ${d.urgent?'decision-urgent':'decision-normal'}">${d.urgent?'Urgent':'Can Wait'}</div>
                    <div class="decision-text">${escHtml(d.text)}</div>
                    <div class="decision-buttons">
                        <button class="decision-btn decision-btn-do" onclick="toggleDecision(${idx}, 'do')">✓ Do This</button>
                        <button class="decision-btn decision-btn-skip" onclick="toggleDecision(${idx}, 'skip')">✕ Skip</button>
                    </div>
                </div>
            `).join('') + '</div>';
        }

        function escHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Global toggles
        window.toggleEvidence = function(id, btn) {
            const el = document.getElementById(id);
            el.classList.toggle('open');
            btn.textContent = el.classList.contains('open')
                ? 'Hide Evidence'
                : 'Show Evidence (' + el.querySelectorAll('.evidence-item').length + ')';
        };

        window.toggleDecision = function(idx, action) {
            const card = document.querySelector(`[data-decision-idx="${idx}"]`);
            if (!card) return;
            card.classList.remove('toggled-do', 'toggled-skip');
            if (action === 'do') {
                card.classList.toggle('toggled-do');
            } else if (action === 'skip') {
                card.classList.toggle('toggled-skip');
            }
        };
    })();
    </script>
</body>
</html>
